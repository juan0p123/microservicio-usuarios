<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Promedio Ponderado</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Calculadora de Promedio Ponderado</h1>

    <form id="formulario">
      <div class="campo">
        <label>Nota 1 (10%)</label>
        <input type="number" id="nota1" min="1" max="7" step="0.1" required>
      </div>

      <div class="campo">
        <label>Nota 2 (20%)</label>
        <input type="number" id="nota2" min="1" max="7" step="0.1" required>
      </div>

      <div class="campo">
        <label>Nota 3 (30%)</label>
        <input type="number" id="nota3" min="1" max="7" step="0.1" required>
      </div>

      <div class="campo">
        <label>Nota 4 (40%)</label>
        <input type="number" id="nota4" min="1" max="7" step="0.1" required>
      </div>

      <!-- ⚠️ SIN onclick -->
      <button type="submit">Calcular Promedio</button>
    </form>

    <div id="resultado" class="resultado oculto">
      <h2>Promedio Final: <span id="promedio"></span></h2>
      <p id="estado"></p>
    </div>
  </div>

  <script src="calculadora.js"></script>
</body>
</html>
